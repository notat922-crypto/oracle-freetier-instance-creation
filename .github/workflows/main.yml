name: Oracle Free Tier Instance Creation

on:
  schedule:
    - cron: '*/25 * * * *'
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Create OCI config
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/private_key.pem
          chmod 600 ~/.oci/private_key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_ID }}
          fingerprint=${{ secrets.OCI_KEY_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_ID }}
          region=${{ secrets.OCI_REGION }}
          key_file=~/.oci/private_key.pem
          EOF
          
      - name: Create oci.env
        run: |
          cat > oci.env << EOF
          OCI_REGION=${{ secrets.OCI_REGION }}
          OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}
          OCI_USER_ID=${{ secrets.OCI_USER_ID }}
          OCI_KEY_FINGERPRINT=${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}
          OCPUS=4
          MEMORY_IN_GBS=24
          EOF
          
      - name: Run instance creation
        run: python main.py
